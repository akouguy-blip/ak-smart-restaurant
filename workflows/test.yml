# ============================================================
# AK Smart Restaurant — Tests rapides
#
# Ce workflow tourne en 2-3 minutes et vérifie juste :
#   - Que le backend compile (TypeScript)
#   - Que le frontend compile (Vite)
#   - Que le wrapper Electron compile (TypeScript)
#
# Il NE produit PAS de .exe — c'est juste pour détecter rapidement
# si une modification a cassé le code, sans attendre 15 min.
# ============================================================

name: Tests rapides

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [main]

jobs:
  quick-check:
    name: Vérification du code
    runs-on: ubuntu-latest  # Plus rapide et moins cher que windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cache des deps pour accélérer
      - name: Cache backend
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-backend-${{ hashFiles('backend/package.json') }}

      - name: Cache frontend
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/package.json') }}

      - name: Install backend deps
        working-directory: backend
        run: npm install --no-audit --no-fund --ignore-scripts

      - name: Compile backend (TypeScript)
        working-directory: backend
        run: |
          npm rebuild better-sqlite3  # Compile native module
          npm run build

      - name: Install frontend deps
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify dist outputs
        run: |
          echo "Backend dist files:"
          ls -la backend/dist/ | head
          echo "Frontend dist files:"
          ls -la frontend/dist/ | head
