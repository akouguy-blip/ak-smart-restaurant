# ============================================================
# AK Smart Restaurant — version SQLite (production cloud)
#
# Un seul container : backend + frontend + base SQLite intégrée.
# Lancement : docker compose up -d
# Accès     : http://localhost
# ============================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_long_random_string}
      SQLITE_PATH: /app/data/akresto.db
    volumes:
      # Base de données persistante (sauvegardée même si on supprime le container)
      - akresto_data:/app/data

volumes:
  akresto_data:
